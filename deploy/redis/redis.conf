# Redis configuration for SaaS-PDF
# IMPORTANT: Do NOT commit production secrets. Replace `requirepass` with a
# secure password provided via host secret management or mount a secrets file.

# Bind to localhost to avoid exposing Redis to the public network
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300
supervised no

# requirepass is intentionally NOT set here.
# The password is injected at runtime via docker-compose:
#   command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
# This avoids committing secrets to the config file.

# Disable or rename dangerous commands (empty name = disabled)
rename-command CONFIG ""
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command SHUTDOWN ""

# Persistence / safe defaults
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes

# Logging and data dir
loglevel notice
dir /data

# --- Memory Management ---
# Limit Redis memory to 512MB to leave room for app/celery
maxmemory 512mb
# Evict keys using LRU when limit is reached
maxmemory-policy allkeys-lru

# Lazy freeing for performance
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes
