# Redis configuration for SaaS-PDF
# IMPORTANT: Do NOT commit production secrets. Replace `requirepass` with a
# secure password provided via host secret management or mount a secrets file.

# Bind to localhost to avoid exposing Redis to the public network
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300
supervised no

# SECURITY: Set a strong password. Replace the placeholder before deployment.
requirepass CHANGE_ME_REDIS_PASSWORD_DO_NOT_COMMIT

# Disable or rename dangerous commands (empty name = disabled)
rename-command CONFIG ""
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command SHUTDOWN ""

# Persistence / safe defaults
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes

# Logging and data dir
loglevel notice
dir /data

# Optional: use an ACL file instead of requirepass for fine-grained control
# aclfile /data/users.acl
