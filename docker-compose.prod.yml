services:
  # --- PostgreSQL (launch-ready cutover target) ---
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-dociva}
      - POSTGRES_USER=${POSTGRES_USER:-dociva}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dociva} -d ${POSTGRES_DB:-dociva}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # --- Redis ---
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
      - ./deploy/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    # --requirepass injects the password at runtime from the .env REDIS_PASSWORD.
    # This avoids hardcoding secrets in redis.conf which is committed to git.
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always

  # --- Flask Backend (Gunicorn) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
      - DATABASE_URL=${DATABASE_URL:-}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-2}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-45}
      - GUNICORN_LOG_LEVEL=${GUNICORN_LOG_LEVEL:-warning}
      - GUNICORN_MAX_REQUESTS=${GUNICORN_MAX_REQUESTS:-500}
      - GUNICORN_MAX_REQUESTS_JITTER=${GUNICORN_MAX_REQUESTS_JITTER:-50}
    volumes:
      - upload_data:/tmp/uploads
      - output_data:/tmp/outputs
      - db_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Limit backend to 512 MB — it should only route/validate, not process files
    mem_limit: 512m
    mem_reservation: 128m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always

  # --- Celery Workers (Isolated Queues) ---
  
  celery_worker_light:
    build: { context: ./backend, dockerfile: Dockerfile }
    # concurrency=2: light_tasks are quick (word count, compress, metadata).
    command: celery -A celery_worker.celery worker --loglevel=warning --concurrency=2 -Q light_tasks -n worker_light@%h
    env_file: [.env]
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes:
      - upload_data:/tmp/uploads
      - output_data:/tmp/outputs
      - db_data:/app/data
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    mem_limit: 256m
    mem_reservation: 64m
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 1
    restart: always

  celery_worker_image:
    build: { context: ./backend, dockerfile: Dockerfile }
    command: celery -A celery_worker.celery worker --loglevel=warning --concurrency=1 -Q image_processing -n worker_image@%h
    env_file: [.env]
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes:
      - upload_data:/tmp/uploads
      - output_data:/tmp/outputs
      - db_data:/app/data
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    mem_limit: 512m
    mem_reservation: 128m
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 1
    restart: always

  celery_worker_pdf:
    build: { context: ./backend, dockerfile: Dockerfile }
    command: celery -A celery_worker.celery worker --loglevel=warning --concurrency=1 -Q pdf_processing -n worker_pdf@%h
    env_file: [.env]
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes:
      - upload_data:/tmp/uploads
      - output_data:/tmp/outputs
      - db_data:/app/data
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    mem_limit: 768m
    mem_reservation: 128m
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 1
    restart: always

  celery_worker_heavy:
    build: { context: ./backend, dockerfile: Dockerfile }
    # OCR + AI heavy: ONNX, Tesseract, OpenRouter — needs more RAM
    command: celery -A celery_worker.celery worker --loglevel=warning --concurrency=1 -Q ocr_tasks,ai_heavy -n worker_heavy@%h
    env_file: [.env]
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes:
      - upload_data:/tmp/uploads
      - output_data:/tmp/outputs
      - db_data:/app/data
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    # OCR + AI models can be memory-hungry — cap at 1 GB
    mem_limit: 1024m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 1
    restart: always

  celery_worker_video:
    build: { context: ./backend, dockerfile: Dockerfile }
    # FFmpeg can be very memory-hungry for large video files
    command: celery -A celery_worker.celery worker --loglevel=warning --concurrency=1 -Q video_processing -n worker_video@%h
    env_file: [.env]
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes:
      - upload_data:/tmp/uploads
      - output_data:/tmp/outputs
      - db_data:/app/data
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    mem_limit: 512m
    mem_reservation: 128m
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 1
    restart: always

  celery_worker_default:
    build: { context: ./backend, dockerfile: Dockerfile }
    command: celery -A celery_worker.celery worker --loglevel=warning --concurrency=2 -Q default -n worker_default@%h
    env_file: [.env]
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes:
      - upload_data:/tmp/uploads
      - output_data:/tmp/outputs
      - db_data:/app/data
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 1
    restart: always

  flower:
    build: { context: ./backend, dockerfile: Dockerfile }
    command: celery -A celery_worker.celery flower --port=5555
    ports: ["5555:5555"]
    env_file: [.env]
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      redis: { condition: service_healthy }
    # Override Dockerfile HEALTHCHECK — Flower serves its own HTTP UI on 5555.
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5555"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: always

  # --- Celery Beat (Scheduled Tasks) ---
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A celery_worker.celery beat
      --loglevel=warning
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
      - DATABASE_URL=${DATABASE_URL:-}
    volumes:
      - upload_data:/tmp/uploads
      - output_data:/tmp/outputs
      - db_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 1
    restart: always

  # --- Nginx (serves built frontend + reverse proxy) ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    # Memory limits removed to ensure Nginx proxy zones don't cause OOMKills.
    healthcheck:
      # Use --max-redirect=0 to avoid following the 308 HTTPS redirect, 
      # which would fail due to missing localhost SSL cert.
      test: ["CMD-SHELL", "wget -q --max-redirect=0 http://localhost || true"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always



  # --- Frontend (Static Files Nginx) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
        VITE_PLAUSIBLE_DOMAIN: ${VITE_PLAUSIBLE_DOMAIN:-}
        VITE_PLAUSIBLE_SRC: ${VITE_PLAUSIBLE_SRC:-https://plausible.io/js/script.js}
        VITE_GOOGLE_SITE_VERIFICATION: ${VITE_GOOGLE_SITE_VERIFICATION:-}
        VITE_ADSENSE_CLIENT_ID: ${VITE_ADSENSE_CLIENT_ID:-}
        VITE_ADSENSE_SLOT_HOME_TOP: ${VITE_ADSENSE_SLOT_HOME_TOP:-}
        VITE_ADSENSE_SLOT_HOME_BOTTOM: ${VITE_ADSENSE_SLOT_HOME_BOTTOM:-}
        VITE_ADSENSE_SLOT_TOP_BANNER: ${VITE_ADSENSE_SLOT_TOP_BANNER:-}
        VITE_ADSENSE_SLOT_BOTTOM_BANNER: ${VITE_ADSENSE_SLOT_BOTTOM_BANNER:-}
        VITE_FEATURE_EDITOR: ${VITE_FEATURE_EDITOR:-true}
        VITE_FEATURE_OCR: ${VITE_FEATURE_OCR:-true}
        VITE_FEATURE_REMOVEBG: ${VITE_FEATURE_REMOVEBG:-true}
        VITE_SITE_DOMAIN: ${VITE_SITE_DOMAIN:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_CLARITY_PROJECT_ID: ${VITE_CLARITY_PROJECT_ID:-}
        INDEXNOW_KEY: ${INDEXNOW_KEY:-}
        INDEXNOW_ENDPOINT: ${INDEXNOW_ENDPOINT:-https://www.bing.com/indexnow}
        INDEXNOW_STRICT: ${INDEXNOW_STRICT:-false}
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
  gitea:
    image: gitea/gitea:latest
    restart: always
    environment:
      - USER_UID=1000
      - USER_GID=1000
      # Expose the correct SSH port to users (host maps 2222 -> container 22)
      - GITEA__server__SSH_PORT=2222
      # Optional: set these in .env for correct clone URLs
      - GITEA__server__DOMAIN=${GITEA_DOMAIN:-}
      - GITEA__server__ROOT_URL=${GITEA_ROOT_URL:-}
    volumes:
      - gitea_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "3000"
    ports:
      - "2222:22"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  upload_data:
  output_data:
  db_data:
  gitea_data:
