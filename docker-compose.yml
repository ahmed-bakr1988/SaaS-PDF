services:
  # --- Redis ---
  redis:
    image: redis:7-alpine
    ports:
      # Bind Redis port to localhost to avoid exposing it to the public network.
      # For production, prefer removing host port mapping entirely and keeping
      # the service on the internal Docker network (or use compose prod file).
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
      # Mount local secure Redis config (read-only). Replace or manage the
      # requirepass via secrets in production; do NOT commit real passwords.
      - ./deploy/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=dociva
      - POSTGRES_USER=dociva
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-dev-only-password-12345}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dociva -d dociva"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Flask Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://dociva:${POSTGRES_PASSWORD:-6x3PjV4ghRTQuZ3Q}@postgres:5432/dociva
      # Redis URLs are loaded from env_file (.env) to allow override.yml to work correctly.
    volumes:
      - ./backend:/app
      - upload_data:/tmp/uploads
      - output_data:/tmp/outputs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # --- Celery Workers (Isolated Queues) ---
  
  # 1. Light Tasks Worker (High Concurrency, Low CPU)
  celery_worker_light:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A celery_worker.celery worker
      --loglevel=info
      --concurrency=4
      -Q light_tasks
      -n worker_light@%h
    env_file: [.env]
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://dociva:${POSTGRES_PASSWORD:-6x3PjV4ghRTQuZ3Q}@postgres:5432/dociva
    volumes:
      - ./backend:/app
      - upload_data:/tmp/uploads
      - output_data:/tmp/outputs
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  # 2. PDF Processing Worker (Medium Concurrency)
  celery_worker_pdf:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A celery_worker.celery worker
      --loglevel=info
      --concurrency=1
      -Q pdf_processing
      -n worker_pdf@%h
    env_file: [.env]
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://dociva:${POSTGRES_PASSWORD:-6x3PjV4ghRTQuZ3Q}@postgres:5432/dociva
    volumes:
      - ./backend:/app
      - upload_data:/tmp/uploads
      - output_data:/tmp/outputs
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  # 3. Image Processing Worker
  celery_worker_image:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A celery_worker.celery worker
      --loglevel=info
      --concurrency=1
      -Q image_processing
      -n worker_image@%h
    env_file: [.env]
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://dociva:${POSTGRES_PASSWORD:-6x3PjV4ghRTQuZ3Q}@postgres:5432/dociva
    volumes:
      - ./backend:/app
      - upload_data:/tmp/uploads
      - output_data:/tmp/outputs
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  # 4. OCR & AI Worker (CPU/RAM Heavy - strictly isolated)
  celery_worker_heavy:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A celery_worker.celery worker
      --loglevel=info
      --concurrency=1
      -Q ocr_tasks,ai_heavy
      -n worker_heavy@%h
    env_file: [.env]
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://dociva:${POSTGRES_PASSWORD:-6x3PjV4ghRTQuZ3Q}@postgres:5432/dociva
    volumes:
      - ./backend:/app
      - upload_data:/tmp/uploads
      - output_data:/tmp/outputs
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  # 5. Video Worker
  celery_worker_video:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A celery_worker.celery worker
      --loglevel=info
      --concurrency=1
      -Q video_processing
      -n worker_video@%h
    env_file: [.env]
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://dociva:${POSTGRES_PASSWORD:-6x3PjV4ghRTQuZ3Q}@postgres:5432/dociva
    volumes:
      - ./backend:/app
      - upload_data:/tmp/uploads
      - output_data:/tmp/outputs
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  # 6. Default Worker
  celery_worker_default:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A celery_worker.celery worker
      --loglevel=info
      --concurrency=2
      -Q default
      -n worker_default@%h
    env_file: [.env]
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://dociva:${POSTGRES_PASSWORD:-6x3PjV4ghRTQuZ3Q}@postgres:5432/dociva
    volumes:
      - ./backend:/app
      - upload_data:/tmp/uploads
      - output_data:/tmp/outputs
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  # --- Celery Monitoring (Flower) ---
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_worker.celery flower --port=5555
    ports:
      - "5555:5555"
    env_file: [.env]
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped

  # --- Celery Beat (Scheduled Tasks) ---
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A celery_worker.celery beat
      --loglevel=info
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://dociva:${POSTGRES_PASSWORD:-6x3PjV4ghRTQuZ3Q}@postgres:5432/dociva
      # Redis URLs are loaded from env_file (.env) to allow override.yml to work correctly.
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # The backend Dockerfile defines a HEALTHCHECK against /api/health.
    # Beat doesn't expose HTTP, so override to avoid a perpetual unhealthy status.
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 1
    restart: unless-stopped

  # --- React Frontend (Vite Dev) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_GA_MEASUREMENT_ID=${VITE_GA_MEASUREMENT_ID:-}
      - VITE_PLAUSIBLE_DOMAIN=${VITE_PLAUSIBLE_DOMAIN:-}
      - VITE_PLAUSIBLE_SRC=${VITE_PLAUSIBLE_SRC:-https://plausible.io/js/script.js}
      - VITE_GOOGLE_SITE_VERIFICATION=${VITE_GOOGLE_SITE_VERIFICATION:-}
      - VITE_ADSENSE_CLIENT_ID=${VITE_ADSENSE_CLIENT_ID:-}
      - VITE_ADSENSE_SLOT_HOME_TOP=${VITE_ADSENSE_SLOT_HOME_TOP:-}
      - VITE_ADSENSE_SLOT_HOME_BOTTOM=${VITE_ADSENSE_SLOT_HOME_BOTTOM:-}
      - VITE_ADSENSE_SLOT_TOP_BANNER=${VITE_ADSENSE_SLOT_TOP_BANNER:-}
      - VITE_ADSENSE_SLOT_BOTTOM_BANNER=${VITE_ADSENSE_SLOT_BOTTOM_BANNER:-}
      - VITE_FEATURE_EDITOR=${VITE_FEATURE_EDITOR:-true}
      - VITE_FEATURE_OCR=${VITE_FEATURE_OCR:-true}
      - VITE_FEATURE_REMOVEBG=${VITE_FEATURE_REMOVEBG:-true}
      - VITE_SITE_DOMAIN=${VITE_SITE_DOMAIN:-}
      - VITE_SENTRY_DSN=${VITE_SENTRY_DSN:-}

   # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ${HOST_LETSENCRYPT_CONF:-./certbot/conf}:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # --- Certbot (Let's Encrypt) ---
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

  # --- Gitea (self-hosted Git) ---
  gitea:
    image: gitea/gitea:latest
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__DOMAIN=${GITEA_DOMAIN:-}
      - GITEA__server__ROOT_URL=${GITEA_ROOT_URL:-}
    volumes:
      - gitea_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "3000"
    ports:
      - "2222:22"

volumes:
  redis_data:
  postgres_data:
  upload_data:
  output_data:
  gitea_data:
