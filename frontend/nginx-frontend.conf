server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve gzip-compressed assets to reduce bandwidth
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain text/css application/json
        application/javascript text/xml application/xml
        text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Security headers are handled by the main Nginx reverse proxy.

    # Cache fingerprinted static assets for 1 year (immutable)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve .mjs ES module files with correct MIME type
    location ~* \.mjs$ {
        types { }
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve only generated route shells and real assets.
    # Unknown paths must return 404 to avoid Soft 404 indexing.
    # Serve the React app on 404 so React Router shows the "Not Found" UI.
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /index.html;
}
