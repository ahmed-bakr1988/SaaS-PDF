server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve gzip-compressed assets to reduce bandwidth
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain text/css application/json
        application/javascript text/xml application/xml
        text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Security headers (lightweight — main Nginx adds the heavy headers)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Cache fingerprinted static assets for 1 year (immutable)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all unknown routes return index.html
    # React Router handles routing on the client side
    location / {
        try_files $uri $uri/ /index.html;
    }
}
