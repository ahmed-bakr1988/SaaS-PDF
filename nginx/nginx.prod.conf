# ============================================================
# Dociva.io — Nginx Production Configuration
# Last updated: 2026-05-10
# ============================================================

# ── Rate-limiting zones ────────────────────────────────────────────────────
# General API calls: 10 req/s per IP, burst up to 30 with nodelay
limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=10r/s;
# Heavy uploads: 2 req/s per IP, no burst (prevent large-file flooding)
limit_req_zone $binary_remote_addr zone=upload_limit:10m  rate=2r/s;
# Auth endpoints (login / register / social): strict brute-force protection
limit_req_zone $binary_remote_addr zone=auth_limit:10m    rate=5r/m;
# Webhook endpoints (PayPal): PayPal signs each call, but still cap abuse
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=30r/m;

# ── Concurrent connection limit per IP ────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# ── WebSocket connection upgrade map ─────────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── File-size limits per plan — enforced upstream in Flask/policy_service ─
# Nginx only needs to accept the maximum Business plan size (2 GB).
# Per-plan enforcement is done in policy_service.validate_actor_file().
map $uri $upload_max_body {
    default 2200m;   # 2.2 GB ceiling — any larger is rejected by Flask anyway
}

# ============================================================
# HTTP → HTTPS redirect (dociva.io + www)
# ============================================================
server {
    listen 80;
    server_name dociva.io www.dociva.io;

    # ACME challenge for Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 308 https://dociva.io$request_uri;
    }
}

# ── Gitea HTTP → HTTPS redirect ──────────────────────────────────────────
server {
    listen 80;
    server_name git.dociva.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 308 https://git.dociva.io$request_uri;
    }
}

# ── www → non-www redirect ───────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
     
    server_name www.dociva.io;
    client_max_body_size 2200m;

    ssl_certificate     /etc/letsencrypt/live/dociva.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dociva.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 308 https://dociva.io$request_uri;
}

# ============================================================
# Main HTTPS server — dociva.io
# ============================================================
server {
    listen 443 ssl;
    http2 on;
     
    server_name dociva.io;

    # ── File size & connection limits ──────────────────────────────────────
    client_max_body_size 2200m;     # hard ceiling (per-plan enforced in Flask)
    client_body_timeout  120s;      # abort slow uploads that stop sending data
    client_header_timeout 15s;      # kill slow-header attacks

    # ── Docker DNS resolver (required for variable-based proxy_pass) ───────


    # ── SSL / TLS ──────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/dociva.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dociva.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;
    add_header X-Canonical-Host          "dociva.io"                                    always;
    add_header X-Request-ID              $request_id                                    always;

    # Content-Security-Policy (Must be a single line to avoid HTTP/2 protocol errors)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://pagead2.googlesyndication.com https://www.googletagmanager.com https://www.google-analytics.com https://plausible.io https://*.clarity.ms https://unpkg.com https://*.adtrafficquality.google; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://pagead2.googlesyndication.com https://www.google-analytics.com https://*.clarity.ms; connect-src 'self' blob: data: https://www.google-analytics.com https://pagead2.googlesyndication.com https://plausible.io https://*.adtrafficquality.google https://*.clarity.ms; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; worker-src 'self' blob:; frame-ancestors 'self'" always;

    # ── Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # ── SEO files — served from frontend container ────────────────────────
    location ~* ^/(sitemap\.xml|robots\.txt|llms\.txt|humans\.txt)$ {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── SSE streaming — AI chat ─────────────────────────────────────────
    # No rate limit here: the upstream already enforces credit deduction.
    location /api/assistant/chat/stream {
        limit_conn conn_per_ip 4;           # max 4 concurrent SSE streams per IP

        proxy_pass         http://backend:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_set_header   Connection        '';
        proxy_http_version 1.1;
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding off;
        proxy_read_timeout  180s;   # 3 min max for AI stream
        proxy_send_timeout  180s;
    }

    # ── Upload-heavy endpoints — strict rate & connection limits ───────────
    # These paths accept large file bodies; apply dedicated upload_limit zone.
    location ~* ^/api/(pdf-tools|ocr|convert|compress|image|video|removebg|html-to-pdf|editor)/ {
        limit_req  zone=upload_limit burst=5 nodelay;
        limit_conn conn_per_ip 8;

        proxy_pass         http://backend:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;

        # Upload timeout — allow up to 10 min for very large files (Business)
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;

        # Stream the request body to Flask without buffering to disk in Nginx
        proxy_request_buffering off;
        proxy_buffering         off;
    }

    # ── Auth endpoints — brute-force protection ────────────────────────────
    location ~* ^/api/auth/ {
        limit_req  zone=auth_limit burst=10 nodelay;
        limit_conn conn_per_ip 5;

        proxy_pass         http://backend:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── PayPal webhook endpoint ────────────────────────────────────────────
    location /api/paypal/webhook {
        limit_req  zone=webhook_limit burst=20 nodelay;

        proxy_pass         http://backend:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Task status polling ────────────────────────────────────────────────
    # High-frequency endpoint; cap per-IP but allow higher burst than uploads
    location ~* ^/api/tasks/ {
        limit_req  zone=api_limit burst=60 nodelay;
        limit_conn conn_per_ip 20;

        proxy_pass         http://backend:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;

        # Short cache for identical polling requests (1s) to absorb bursts
        # Note: Requires a proxy_cache_path zone to be fully active.
        # proxy_cache_valid 200 1s;
    }

    # ── Download endpoint ──────────────────────────────────────────────────
    location ~* ^/api/download/ {
        limit_req  zone=api_limit burst=20 nodelay;
        limit_conn conn_per_ip 5;

        proxy_pass         http://backend:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_read_timeout 120s;   # send_file may take time for large outputs
        proxy_send_timeout 120s;
        proxy_buffering    off;
    }

    # ── General API ────────────────────────────────────────────────────────
    location /api/ {
        limit_req  zone=api_limit burst=30 nodelay;
        limit_conn conn_per_ip 15;

        proxy_pass         http://backend:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
    }

    # ── Health check (no rate limit — used by Docker & uptime monitors) ───
    location /health {
        limit_conn conn_per_ip 5;
        proxy_pass         http://backend:5000/api/health;
        proxy_set_header   Host $host;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # ── Frontend (React SPA) — proxy to frontend container ────────────────
    # IMPORTANT: Nginx ↔ browser uses HTTP/2, but Nginx ↔ frontend container
    # must use HTTP/1.1. Mixing versions causes ERR_HTTP2_PROTOCOL_ERROR.
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;            # Force HTTP/1.1 for upstream
        proxy_set_header   Connection "";  # Keepalive for HTTP/1.1
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
        # Frontend container handles caching headers for static assets.
    }
}

# ============================================================
# Gitea HTTPS reverse proxy
# ============================================================
server {
    listen 443 ssl;
    http2 on;
     
    server_name git.dociva.io;

    ssl_certificate     /etc/letsencrypt/live/dociva.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dociva.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 100m;

    # Docker internal DNS (only needed when using variable-based proxy_pass)
    #resolver 127.0.0.11 valid=10s ipv6=off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    location / {
        proxy_pass         http://gitea:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_connect_timeout  5s;
        proxy_read_timeout    60s;
    }
}
