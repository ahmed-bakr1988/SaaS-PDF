name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Only run after CI passes
    needs: []
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/opt/dociva' }}

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "🔧 Building frontend..."
            cd frontend
            npm ci --production=false
            npm run build
            cd ..

            echo "🐳 Rebuilding containers..."
            docker compose build --no-cache backend
            docker compose up -d --remove-orphans

            echo "⏳ Waiting for services..."
            sleep 10

            echo "🏥 Health check..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Deploy successful! API is healthy."
            else
              echo "❌ Health check failed (HTTP $HTTP_STATUS). Rolling back..."
              docker compose logs --tail=50 backend
              exit 1
            fi

            echo "🔍 Submitting sitemap to search engines..."
            curl -s "https://www.google.com/ping?sitemap=https://dociva.io/sitemap.xml" > /dev/null || true

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed! Check the deploy logs above."
